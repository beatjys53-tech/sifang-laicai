name: Update data and publish Pages
on:
  schedule:
    - cron: "25 22 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: update-and-publish
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Refresh financial data
        run: node scripts/update-data.mjs
      - name: Save refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/financials.json
          git diff --cached --quiet || git commit -m "Update financial data"
          git push origin HEAD:main
      - name: Publish website
        run: git push origin HEAD:gh-pages --force

